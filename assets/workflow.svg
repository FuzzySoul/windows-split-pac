<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Windows Split PAC architecture</title>
  <desc id="desc">A local desktop application generates a PAC file, serves it on loopback, updates Windows PAC settings, and verifies routing decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#081225"/><stop offset="1" stop-color="#102a42"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity=".45"/></filter>
  </defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/>
  <text x="64" y="68" fill="#f8fafc" font-family="Segoe UI, sans-serif" font-size="29" font-weight="700">Windows Split PAC</text>
  <text x="64" y="98" fill="#94a3b8" font-family="Segoe UI, sans-serif" font-size="16">A verifiable local split-routing pipeline for Windows</text>
  <g filter="url(#shadow)" font-family="Segoe UI, sans-serif">
    <rect x="64" y="155" width="220" height="150" rx="18" fill="#12213a" stroke="#27476b"/>
    <text x="88" y="198" fill="#22d3ee" font-size="16" font-weight="700">01 / CONTROL</text>
    <text x="88" y="230" fill="#f8fafc" font-size="21" font-weight="700">Rust desktop UI</text>
    <text x="88" y="262" fill="#94a3b8" font-size="14">Rules, status, rollback</text>
    <rect x="360" y="155" width="220" height="150" rx="18" fill="#12213a" stroke="#27476b"/>
    <text x="384" y="198" fill="#22d3ee" font-size="16" font-weight="700">02 / GENERATE</text>
    <text x="384" y="230" fill="#f8fafc" font-size="21" font-weight="700">GFWList + genpac</text>
    <text x="384" y="262" fill="#94a3b8" font-size="14">Custom rules to PAC</text>
    <rect x="656" y="155" width="220" height="150" rx="18" fill="#12213a" stroke="#27476b"/>
    <text x="680" y="198" fill="#22d3ee" font-size="16" font-weight="700">03 / SERVE</text>
    <text x="680" y="230" fill="#f8fafc" font-size="21" font-weight="700">127.0.0.1 PAC</text>
    <text x="680" y="262" fill="#94a3b8" font-size="14">Local HTTP service</text>
    <rect x="952" y="155" width="184" height="150" rx="18" fill="#12213a" stroke="#27476b"/>
    <text x="976" y="198" fill="#22d3ee" font-size="16" font-weight="700">04 / VERIFY</text>
    <text x="976" y="230" fill="#f8fafc" font-size="21" font-weight="700">Windows PAC</text>
    <text x="976" y="262" fill="#94a3b8" font-size="14">PROXY / DIRECT</text>
  </g>
  <g stroke="url(#accent)" stroke-width="4" fill="none"><path d="M284 230h62"/><path d="M580 230h62"/><path d="M876 230h62"/></g>
  <g fill="#22d3ee"><path d="m346 221 16 9-16 9z"/><path d="m642 221 16 9-16 9z"/><path d="m938 221 16 9-16 9z"/></g>
  <rect x="64" y="350" width="1072" height="2" fill="#27476b"/>
  <text x="64" y="386" fill="#a5f3fc" font-family="Segoe UI, sans-serif" font-size="15">Backup first. Apply locally. Verify actual PAC decisions. Restore on disable.</text>
</svg>
